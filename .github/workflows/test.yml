name: Test

# Runs the unit + integration test suite under tests/ on every PR and on
# every push to main. Matrix-tests across the supported Python versions
# (3.11 / 3.12 / 3.13) declared in pyproject.toml.
#
# Plotting tests rely on matplotlib; MPLBACKEND=Agg keeps the headless
# runner from trying to open an interactive display.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      MPLBACKEND: Agg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run pytest
        run: pytest tests/ -q

  viewer-extras:
    # Verifies the viewer optional extras resolve and import cleanly.
    # Runs the same smoke tests as the base matrix above plus the
    # extras-gated tests that the base matrix skips. Single Python
    # version is enough for a dep-resolution gate; the base matrix
    # already covers cross-version compatibility for the library core.
    name: Viewer extras resolve
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with viewer + test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[viewer,test]"

      - name: Run viewer smoke tests
        run: pytest tests/viewer/ -q
